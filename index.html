<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Romeo and Juliet Party Quest (RJPQ) 輔助工具</title>
    <!-- 使用 PeerJS 進行 P2P 連線 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --ms-dark-blue: #336699;
            --ms-yellow: #ffcc00;
            --ms-border: #555555;
            --ms-bg: #ececec;
            --ms-content-bg: #ffffff;
            --ms-wz-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            --ms-btn-gradient: linear-gradient(to bottom, #fdfdfd 0%, #dcdcdc 100%);
            --ms-btn-hover-gradient: linear-gradient(to bottom, #fff7cc 0%, #ffcc00 100%);
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #222;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 楓之谷風格對話框 */
        .container {
            background-color: var(--ms-bg);
            border: 3px solid var(--ms-border);
            border-radius: 8px;
            width: 95%;
            max-width: 440px;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            background-color: var(--ms-dark-blue);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--ms-border);
        }

        .header .title {
            font-size: 15px;
            text-shadow: var(--ms-wz-shadow);
        }

        .header .guild {
            font-size: 11px;
            color: var(--ms-yellow);
            text-shadow: var(--ms-wz-shadow);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 面板與區塊 */
        .panel {
            background: var(--ms-content-bg);
            border: 2px solid #bbb;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        .panel-label {
            font-weight: bold;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #444;
            text-shadow: 1px 1px 0 #fff;
        }

        .id-badge {
            font-family: monospace;
            background: #eee;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            border: 1px solid #ccc;
        }

        .participant-list {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .participant-tag {
            font-size: 11px;
            background: #e8f4f8;
            color: #336699;
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid #abd2e0;
        }

        .join-box {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        input {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }

        /* WZ 風格按鈕 */
        .ms-btn {
            background: var(--ms-btn-gradient);
            border: 2px solid var(--ms-border);
            border-radius: 4px;
            padding: 6px 14px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: inset 1px 1px 0px #fff;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.9);
            transition: all 0.1s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .ms-btn:hover:not(:disabled) {
            background: var(--ms-btn-hover-gradient);
            border-color: #775500;
        }

        .ms-btn:active:not(:disabled) {
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .ms-btn.primary {
            background: linear-gradient(to bottom, #77aadd 0%, #336699 100%);
            color: white;
            border-color: #224466;
            text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.5);
        }

        .ms-btn.primary:hover:not(:disabled) {
            background: linear-gradient(to bottom, #88bbec 0%, #4477aa 100%);
        }

        .ms-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f0f0f0;
            border-color: #ccc;
            text-shadow: none;
        }

        /* 系統日誌視窗 */
        .log-section {
            margin-top: 5px;
        }
        .log-header {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        #btn-log-toggle { font-size: 10px; height: 18px; padding: 0 6px; }

        .log-panel {
            background: #111;
            color: #00ff00;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            height: 100px;
            overflow-y: auto;
            padding: 8px;
            border: 2px solid #444;
            border-radius: 4px;
            display: none;
            flex-direction: column-reverse;
        }
        .log-entry { margin-bottom: 2px; }
        .log-warn { color: #ffcc00; }
        .log-error { color: #ff4444; }

        /* 地圖區域 */
        .map-area {
            background: #bbb;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #555;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .floor {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .f-label {
            width: 32px;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #000;
            text-align: right;
        }

        .door-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            flex: 1;
        }

        .door {
            height: 38px;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            border: 2px solid #666;
            border-bottom: 4px solid #444;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
            position: relative;
        }

        .door:hover { border-color: #333; background: #fff; }
        .door:active { border-bottom-width: 2px; transform: translateY(2px); }

        .door.state-pass {
            background: linear-gradient(to bottom, #c3e6cb 0%, #28a745 100%);
            border-color: #1e7e34;
        }
        .door.state-pass::after {
            content: "O";
            color: white;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
        }

        /* 標記者小標簽 */
        .door-tag {
            position: absolute;
            bottom: -2px;
            right: 0;
            font-size: 9px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 0 3px;
            border-radius: 2px;
            transform: scale(0.85);
            pointer-events: none;
            display: none;
        }
        .door.state-pass .door-tag { display: block; }

        .door.state-error {
            background: linear-gradient(to bottom, #f5c6cb 0%, #dc3545 100%);
            border-color: #bd2130;
        }
        .door.state-error::after {
            content: "X";
            color: white;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
        }

        .footer-tools {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .instructions {
            font-size: 11px;
            color: #777;
            text-align: center;
            background: #fdfdfd;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            line-height: 1.6;
        }

        /* Loading */
        #loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
        }

        .spinner {
            width: 30px; height: 30px;
            border: 4px solid #eee; border-top: 4px solid var(--ms-dark-blue);
            border-radius: 50%; animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <b id="load-msg" style="color: var(--ms-dark-blue)">系統連線中...</b>
        </div>

        <div class="header">
            <span class="title">RJPQ 輔助工具</span>
            <span class="guild">aespaaa 公會製作</span>
        </div>

        <div class="content">
            <!-- 房間控制面板 -->
            <div class="panel">
                <div class="panel-label">
                    <span>📡 房間與成員</span>
                    <span class="id-badge" id="my-id-display">我的 ID: ----</span>
                </div>
                
                <div id="init-actions" style="display: flex; gap: 8px;">
                    <button class="ms-btn primary" id="btn-host" onclick="startHost()" style="flex: 1;">建立房間</button>
                    <button class="ms-btn" id="btn-copy" onclick="copyInvite()" style="display: none;">複製連結</button>
                </div>

                <div class="join-box" id="join-row">
                    <input type="text" id="join-id" placeholder="貼上房號 (ID)...">
                    <button class="ms-btn" id="btn-join" onclick="startJoin()">加入房間</button>
                </div>

                <div class="participant-list" id="participant-list">
                    <!-- 成員標籤 -->
                </div>

                <div class="log-section">
                    <div class="log-header" onclick="toggleLog()">
                        <span>系統日誌</span>
                        <button class="ms-btn" id="btn-log-toggle">顯示</button>
                    </div>
                    <div class="log-panel" id="log-panel">
                        <div class="log-entry">> 準備就緒。</div>
                    </div>
                </div>
            </div>

            <!-- 地圖區域 -->
            <div class="map-area" id="map-grid">
                <!-- 由 JS 渲染 -->
            </div>

            <div class="footer-tools">
                <button class="ms-btn" id="btn-reset-all" style="flex: 1; border-color: #e57373; display: none;" onclick="resetAll()">清空所有標記</button>
                <button class="ms-btn" id="btn-reconnect" onclick="location.reload()">重置所有連線</button>
            </div>

            <div class="instructions">
                🕹️ <b>電腦</b>: 左鍵正確 (同步) / 右鍵死路 (本地)<br>
                📱 <b>手機</b>: 點擊正確 (同步) / <b>長按</b>死路 (本地)<br>
                ⚠️ <b>限制</b>: 僅標記者可取消自己的 O。清空標記僅房主可用。<br>
                📢 <b>注意</b>: P2P 在公用 Wi-Fi 或嚴格防火牆下可能無法相連。
            </div>
        </div>
    </div>

    <script>
        // === 狀態變數 ===
        let peer = null;
        let myIdShort = ""; // 縮短版 ID 供署名
        let fullMyId = "";
        let guestConns = [];  // 所有當前連線
        let isHost = false;
        
        // mapData[f][d] = { v: 0|1, owner: 'shortId' }
        const mapData = Array(10).fill().map(() => Array(4).fill().map(() => ({ v: 0, owner: null })));

        const els = {
            load: document.getElementById('loading'),
            loadMsg: document.getElementById('load-msg'),
            log: document.getElementById('log-panel'),
            logBtn: document.getElementById('btn-log-toggle'),
            joinInput: document.getElementById('join-id'),
            btnCopy: document.getElementById('btn-copy'),
            grid: document.getElementById('map-grid'),
            btnHost: document.getElementById('btn-host'),
            btnJoin: document.getElementById('btn-join'),
            myIdBadge: document.getElementById('my-id-display'),
            pList: document.getElementById('participant-list'),
            btnReset: document.getElementById('btn-reset-all')
        };

        // === 工具函式 ===
        const log = (msg, type = "info") => {
            const entry = document.createElement("div");
            entry.className = `log-entry log-${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            els.log.prepend(entry);
        };

        const toggleLog = () => {
            const isHidden = els.log.style.display !== 'flex';
            els.log.style.display = isHidden ? 'flex' : 'none';
            els.logBtn.innerText = isHidden ? '隱藏' : '顯示';
        };

        const setLoading = (show, msg = "處理中...") => {
            els.load.style.display = show ? 'flex' : 'none';
            els.loadMsg.innerText = msg;
        };

        // === PeerJS 核心邏輯 ===
        function initPeer(onReady) {
            if (peer) return onReady();
            
            log("通訊啟動中...", "info");
            setLoading(true, "連線中...");
            
            peer = new Peer({
                debug: 1,
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                fullMyId = id;
                myIdShort = id.substring(0, 4);
                els.myIdBadge.innerText = `我的 ID: ${myIdShort}`;
                log(`網關就緒。我的 ID: ${id}`, "success");
                setLoading(false);
                refreshParticipantList();
                onReady();
            });

            peer.on('connection', (conn) => {
                log(`收到加入請求: ${conn.peer.substring(0,4)}...`, "info");
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                setLoading(false);
                log(`連線異常: ${err.type}`, "error");
                if (err.type === 'peer-unavailable') alert("找不到房號，請確認房號正確且房主在線。");
            });

            peer.on('disconnected', () => {
                log("中斷，重新嘗試中...", "warn");
                peer.reconnect();
            });
        }

        function startHost() {
            initPeer(() => {
                isHost = true;
                els.btnCopy.style.display = "inline-flex";
                els.btnReset.style.display = "inline-flex";
                els.btnHost.disabled = true;
                els.btnJoin.disabled = true;
                log("成為房主。", "success");
                window.location.hash = fullMyId;
            });
        }

        function startJoin() {
            const targetId = els.joinInput.value.trim();
            if (!targetId) return alert("請輸入房號");

            initPeer(() => {
                log(`嘗試連接 ${targetId.substring(0,4)}...`, "info");
                setLoading(true, "握手中...");
                isHost = false;
                
                const conn = peer.connect(targetId, { reliable: true });
                
                conn.on('open', () => {
                    setLoading(false);
                    log("連線成功！", "success");
                    els.joinInput.value = "";
                    els.btnHost.disabled = true;
                    els.btnJoin.disabled = true;
                    // 加入成功後清除網址 Hash
                    history.replaceState(null, document.title, window.location.pathname);
                    setupConnection(conn);
                });

                setTimeout(() => {
                    if (els.load.style.display === 'flex') {
                        setLoading(false);
                        log("連線超時，請檢查房號或雙方網路環境。", "error");
                    }
                }, 10000);
            });
        }

        function setupConnection(conn) {
            if (!guestConns.find(c => c.peer === conn.peer)) {
                guestConns.push(conn);
            }

            conn.on('open', () => {
                refreshParticipantList();
                if (isHost) {
                    conn.send({ type: 'INIT', data: mapData });
                }
            });

            conn.on('data', (payload) => {
                if (payload.type === 'INIT') {
                    for(let f=0; f<10; f++) for(let d=0; d<4; d++) {
                        mapData[f][d] = payload.data[f][d];
                        updateDoorUI(f, d);
                    }
                } else if (payload.type === 'SYNC') {
                    mapData[payload.f][payload.d] = { v: payload.v, owner: payload.owner };
                    updateDoorUI(payload.f, payload.d);
                    if (isHost) broadcast(payload, conn); 
                } else if (payload.type === 'RESET') {
                    clearLocal();
                    if (isHost) broadcast(payload, conn);
                }
            });

            conn.on('close', () => {
                log(`隊友斷線: ${conn.peer.substring(0,4)}`, "warn");
                guestConns = guestConns.filter(c => c !== conn);
                refreshParticipantList();
                if (!isHost && guestConns.length === 0) log("房主已離開。", "error");
            });
        }

        function broadcast(msg, exclude = null) {
            guestConns.forEach(c => {
                if (c.open && c !== exclude) c.send(msg);
            });
        }

        function refreshParticipantList() {
            els.pList.innerHTML = "";
            const ids = [myIdShort];
            guestConns.forEach(c => { if(c.open) ids.push(c.peer.substring(0, 4)); });
            
            ids.forEach(id => {
                const tag = document.createElement("span");
                tag.className = "participant-tag";
                tag.innerText = `👤 ${id}`;
                els.pList.appendChild(tag);
            });
        }

        function copyInvite() {
            const url = window.location.origin + window.location.pathname + "#" + fullMyId;
            navigator.clipboard.writeText(url).then(() => {
                log("邀請連結已複製。", "success");
                alert("連結已複製，傳給隊友後，他們點開並按「加入房間」即可。");
            });
        }

        // === 地圖與點擊邏輯 ===
        function renderGrid() {
            els.grid.innerHTML = "";
            for (let f = 0; f < 10; f++) {
                const floor = document.createElement("div");
                floor.className = "floor";
                const label = document.createElement("div");
                label.className = "f-label";
                label.innerText = `L${10-f}`;
                floor.appendChild(label);

                const doors = document.createElement("div");
                doors.className = "door-grid";
                for (let d = 0; d < 4; d++) {
                    const door = document.createElement("div");
                    door.className = "door";
                    door.id = `d-${f}-${d}`;
                    const tag = document.createElement("div");
                    tag.className = "door-tag";
                    door.appendChild(tag);
                    
                    // --- 點擊事件處理 ---
                    let pressTimer;
                    const startPress = () => { pressTimer = setTimeout(() => onDoorRightClick(f, d), 500); };
                    const cancelPress = () => { clearTimeout(pressTimer); };

                    door.onmousedown = (e) => { if(e.button === 0) startPress(); };
                    door.onmouseup = cancelPress;
                    door.onmouseleave = cancelPress;
                    
                    door.ontouchstart = (e) => { startPress(); };
                    door.ontouchend = cancelPress;

                    door.onclick = (e) => { e.preventDefault(); onDoorClick(f, d); };
                    door.oncontextmenu = (e) => { e.preventDefault(); onDoorRightClick(f, d); };
                    
                    doors.appendChild(door);
                }
                floor.appendChild(doors);
                els.grid.appendChild(floor);
            }
        }

        function onDoorClick(f, d) {
            const item = mapData[f][d];
            
            // 如果這是一個 O 標記，檢查權限
            if (item.v === 1) {
                if (item.owner !== myIdShort && !isHost) {
                    log("權限不足: 僅標記者可移除此 O。", "warn");
                    return;
                }
                item.v = 0;
                item.owner = null;
            } else {
                item.v = 1;
                item.owner = myIdShort;
            }

            updateDoorUI(f, d);
            const msg = { type: 'SYNC', f, d, v: item.v, owner: item.owner };
            if (isHost) broadcast(msg);
            else if (guestConns.length > 0 && guestConns[0].open) guestConns[0].send(msg);
        }

        function onDoorRightClick(f, d) {
            const el = document.getElementById(`d-${f}-${d}`);
            if (el.classList.contains('state-error')) {
                el.classList.remove('state-error');
                updateDoorUI(f, d);
            } else {
                el.classList.remove('state-pass');
                el.classList.add('state-error');
            }
        }

        function updateDoorUI(f, d) {
            const el = document.getElementById(`d-${f}-${d}`);
            const tag = el.querySelector('.door-tag');
            const item = mapData[f][d];
            
            if (item.v === 1) {
                el.classList.add('state-pass');
                el.classList.remove('state-error');
                tag.innerText = item.owner;
            } else {
                el.classList.remove('state-pass');
                tag.innerText = "";
            }
        }

        function resetAll() {
            if (!isHost) return;
            if (!confirm("確定要清空全場標記？")) return;
            clearLocal();
            broadcast({ type: 'RESET' });
        }

        function clearLocal() {
            for(let f=0; f<10; f++) for(let d=0; d<4; d++) {
                mapData[f][d] = { v: 0, owner: null };
                const el = document.getElementById(`d-${f}-${d}`);
                el.classList.remove('state-pass', 'state-error');
            }
        }

        // === 啟動 ===
        renderGrid();
        const initialHash = window.location.hash.substring(1);
        if (initialHash) {
            els.joinInput.value = initialHash;
            log("網址包含房號，請點擊『加入房間』。", "warn");
        }
    </script>
</body>

</html>
