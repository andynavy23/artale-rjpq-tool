<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RJPQ 輔助工具</title>
    <!-- 使用 PeerJS 進行 P2P 連線 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --ms-dark-blue: #336699;
            --ms-yellow: #ffcc00;
            --ms-border: #555555;
            --ms-bg: #ececec;
            --ms-content-bg: #ffffff;
            --ms-wz-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            --ms-btn-gradient: linear-gradient(to bottom, #fdfdfd 0%, #dcdcdc 100%);
            --ms-btn-hover-gradient: linear-gradient(to bottom, #fff7cc 0%, #ffcc00 100%);
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #222;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 楓之谷風格對話框 */
        .container {
            background-color: var(--ms-bg);
            border: 3px solid var(--ms-border);
            border-radius: 8px;
            width: 95%;
            max-width: 420px;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            background-color: var(--ms-dark-blue);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--ms-border);
        }

        .header .title {
            font-size: 16px;
            text-shadow: var(--ms-wz-shadow);
        }

        .header .guild {
            font-size: 11px;
            color: var(--ms-yellow);
            text-shadow: var(--ms-wz-shadow);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 面板與區塊 */
        .panel {
            background: var(--ms-content-bg);
            border: 2px solid #bbb;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        .panel-label {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            color: #444;
            text-shadow: 1px 1px 0 #fff;
        }

        .join-box {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }

        /* WZ 風格按鈕 */
        .ms-btn {
            background: var(--ms-btn-gradient);
            border: 2px solid var(--ms-border);
            border-radius: 4px;
            padding: 6px 14px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: inset 1px 1px 0px #fff;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.9);
            transition: all 0.1s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .ms-btn:hover {
            background: var(--ms-btn-hover-gradient);
            border-color: #775500;
        }

        .ms-btn:active {
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .ms-btn.primary {
            background: linear-gradient(to bottom, #77aadd 0%, #336699 100%);
            color: white;
            border-color: #224466;
            text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.5);
        }

        .ms-btn.primary:hover {
            background: linear-gradient(to bottom, #88bbec 0%, #4477aa 100%);
        }

        .ms-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #eee !important;
        }

        /* 系統日誌視窗 */
        .log-panel {
            background: #111;
            color: #00ff00;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            height: 80px;
            overflow-y: auto;
            padding: 8px;
            border: 2px solid #444;
            border-radius: 4px;
            margin-top: 5px;
            display: flex;
            flex-direction: column-reverse; /* 新訊息在最下面，並保持捲動到底部 */
        }
        .log-entry { margin-bottom: 2px; }
        .log-info { color: #aaa; }
        .log-warn { color: #ffcc00; }
        .log-error { color: #ff4444; }
        .log-success { color: #00ff00; }

        /* 地圖區域 */
        .map-area {
            background: #bbb;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #555;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .floor {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .f-label {
            width: 32px;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #000;
            text-align: right;
        }

        .door-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            flex: 1;
        }

        .door {
            height: 32px;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            border: 2px solid #666;
            border-bottom: 4px solid #444;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        .door:hover {
            border-color: #333;
            background: #fff;
        }

        .door:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        .door.state-pass {
            background: linear-gradient(to bottom, #c3e6cb 0%, #28a745 100%);
            border-color: #1e7e34;
        }
        .door.state-pass::after {
            content: "O";
            color: white;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
        }

        .door.state-error {
            background: linear-gradient(to bottom, #f5c6cb 0%, #dc3545 100%);
            border-color: #bd2130;
        }
        .door.state-error::after {
            content: "X";
            color: white;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
        }

        .footer-tools {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .instructions {
            font-size: 11px;
            color: #888;
            text-align: center;
            background: #f8f8f8;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        /* Loading */
        #loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid #eee;
            border-top: 4px solid var(--ms-dark-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <b id="load-msg" style="color: var(--ms-dark-blue)">系統連線中...</b>
        </div>

        <div class="header">
            <span class="title">RJPQ 輔助工具</span>
            <span class="guild">aespaaa 公會製作</span>
        </div>

        <div class="content">
            <!-- 房間控制面板 -->
            <div class="panel">
                <span class="panel-label">🛠️ 房間控制</span>
                <div id="init-actions" style="display: flex; gap: 8px;">
                    <button class="ms-btn primary" id="btn-host" onclick="startHost()" style="flex: 1;">建立房間</button>
                    <button class="ms-btn" id="btn-copy" onclick="copyInvite()" style="display: none;">複製連結</button>
                </div>

                <div class="join-box" id="join-row">
                    <input type="text" id="join-id" placeholder="貼上房號 (ID)...">
                    <button class="ms-btn" id="btn-join" onclick="startJoin()">加入房間</button>
                </div>

                <div class="log-panel" id="log-panel">
                    <!-- 日誌訊息 -->
                    <div class="log-entry log-success">> 系統就緒。請建立或加入房間。</div>
                </div>
            </div>

            <!-- 地圖區域 -->
            <div class="map-area" id="map-grid">
                <!-- 由 JS 渲染 -->
            </div>

            <div class="footer-tools">
                <button class="ms-btn" style="flex: 1; border-color: #e57373;" onclick="resetAll()">全地圖清空</button>
                <button class="ms-btn" onclick="location.reload()">重新整頁</button>
            </div>

            <div class="instructions">
                🕹️ <b>左鍵</b>: 標記正確 (同步) | 🕹️ <b>右鍵</b>: 標記死路 (本地)<br>
                <span>診斷: 若卡在「正在呼叫」，請確認雙方皆在同網域或房號正確。</span>
            </div>
        </div>
    </div>

    <script>
        // === 狀態變數 ===
        let peer = null;
        let myId = null;
        let guestConns = [];  // 所有當前連線
        let isHost = false;
        const mapData = Array(10).fill().map(() => Array(4).fill(0));

        const els = {
            load: document.getElementById('loading'),
            loadMsg: document.getElementById('load-msg'),
            log: document.getElementById('log-panel'),
            joinInput: document.getElementById('join-id'),
            btnCopy: document.getElementById('btn-copy'),
            grid: document.getElementById('map-grid'),
            btnHost: document.getElementById('btn-host'),
            btnJoin: document.getElementById('btn-join')
        };

        // === 工具函式 ===
        const log = (msg, type = "info") => {
            const entry = document.createElement("div");
            entry.className = `log-entry log-${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            els.log.prepend(entry);
            console.log(`[${type}] ${msg}`);
        };

        const setLoading = (show, msg = "處理中...") => {
            els.load.style.display = show ? 'flex' : 'none';
            els.loadMsg.innerText = msg;
        };

        // === PeerJS 核心邏輯 ===
        function initPeer(onReady) {
            if (peer) return onReady();
            
            log("初始化伺服器連線...", "info");
            setLoading(true, "聯繫 P2P 中繼伺服器...");
            
            peer = new Peer({
                debug: 2,
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                myId = id;
                log(`已建立 P2P 通訊！分配 ID: ${id}`, "success");
                setLoading(false);
                onReady();
            });

            peer.on('connection', (conn) => {
                log(`偵測到新連線: ${conn.peer}`, "info");
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                setLoading(false);
                log(`通訊錯誤 (${err.type}): ${err.message}`, "error");
                
                if (err.type === 'peer-unavailable') {
                    alert("找不到房號。請確認房主是否還在線，或房號輸入正確。");
                }
            });

            peer.on('disconnected', () => {
                log("與中繼伺服器斷線，正在嘗試重新建立背景連結...", "warn");
                peer.reconnect();
            });
        }

        // 房主流程
        function startHost() {
            initPeer(() => {
                isHost = true;
                els.btnCopy.style.display = "inline-flex";
                els.btnHost.disabled = true;
                els.btnJoin.disabled = true;
                log("已建立房間。您現在是『房主』。", "success");
                window.location.hash = myId;
            });
        }

        // 訪客流程
        function startJoin() {
            const targetId = els.joinInput.value.trim();
            if (!targetId) return alert("請貼上正確的房號 (ID)");

            initPeer(() => {
                log(`嘗試向房間 [${targetId}] 發起連線協商...`, "info");
                setLoading(true, "建立 P2P 隧道中...");
                isHost = false;
                
                const conn = peer.connect(targetId, {
                    reliable: true,
                    serialization: 'json'
                });
                
                conn.on('open', () => {
                    setLoading(false);
                    log("連線建立成功！已導通資料通道。", "success");
                    els.joinInput.value = "";
                    els.btnHost.disabled = true;
                    els.btnJoin.disabled = true;
                    window.location.hash = targetId;
                    setupConnection(conn);
                });

                // 超時偵測
                setTimeout(() => {
                    if (els.load.style.display === 'flex') {
                        setLoading(false);
                        log("連線超時！請檢查網路，或是雙方是否都有透過複製連結進入地屬...", "error");
                        log("建議: 房主與訪客皆重新整頁後再次嘗試。", "warn");
                    }
                }, 10000);
            });
        }

        function setupConnection(conn) {
            // 記錄連線
            if (!guestConns.find(c => c.peer === conn.peer)) {
                guestConns.push(conn);
            }

            conn.on('open', () => {
                log(`資料通道啟動 [對象: ${conn.peer}]`, "success");
                if (isHost) {
                    log("同步目前地圖狀態給新加入的隊友...", "info");
                    conn.send({ type: 'INIT', data: mapData });
                }
            });

            conn.on('data', (payload) => {
                handleMessage(payload, conn);
            });

            conn.on('close', () => {
                log(`隊友斷開連線: ${conn.peer}`, "warn");
                guestConns = guestConns.filter(c => c !== conn);
            });
            
            conn.on('error', (err) => {
                log(`通道內發生錯誤: ${err}`, "error");
            });
        }

        function handleMessage(msg, sender) {
            if (msg.type === 'INIT') {
                log("接收房主初始化地圖資訊...", "info");
                for(let f=0; f<10; f++) for(let d=0; d<4; d++) {
                    mapData[f][d] = msg.data[f][d];
                    updateDoorUI(f, d);
                }
            } else if (msg.type === 'SYNC') {
                mapData[msg.f][msg.d] = msg.v;
                updateDoorUI(msg.f, msg.d);
                if (isHost) broadcast(msg, sender); // 房主負責轉發給其他所有房客
            } else if (msg.type === 'RESET') {
                log("接收清空指令，正在重設地圖...", "info");
                clearLocal();
                if (isHost) broadcast(msg, sender);
            }
        }

        function broadcast(msg, exclude = null) {
            guestConns.forEach(c => {
                if (c.open && c !== exclude) c.send(msg);
            });
        }

        function copyInvite() {
            const url = window.location.origin + window.location.pathname + "#" + myId;
            navigator.clipboard.writeText(url).then(() => {
                log("已將包含房號的邀請連結複製到剪貼簿。", "success");
                alert("已複製專屬連結！傳送給隊友後，他們點開並按『加入』即可連線。");
            });
        }

        // === 地圖邏輯 ===
        function renderGrid() {
            els.grid.innerHTML = "";
            for (let f = 0; f < 10; f++) {
                const floor = document.createElement("div");
                floor.className = "floor";
                
                const label = document.createElement("div");
                label.className = "f-label";
                label.innerText = `F${f+1}`;
                floor.appendChild(label);

                const doors = document.createElement("div");
                doors.className = "door-grid";
                for (let d = 0; d < 4; d++) {
                    const door = document.createElement("div");
                    door.className = "door";
                    door.id = `d-${f}-${d}`;
                    
                    door.onclick = (e) => {
                        e.preventDefault();
                        onDoorClick(f, d);
                    };
                    door.oncontextmenu = (e) => {
                        e.preventDefault();
                        onDoorRightClick(f, d);
                    };
                    doors.appendChild(door);
                }
                floor.appendChild(doors);
                els.grid.appendChild(floor);
            }
        }

        function onDoorClick(f, d) {
            const nextVal = mapData[f][d] === 1 ? 0 : 1;
            mapData[f][d] = nextVal;
            updateDoorUI(f, d);
            
            const msg = { type: 'SYNC', f, d, v: nextVal };
            if (isHost) broadcast(msg);
            else if (guestConns.length > 0 && guestConns[0].open) {
                guestConns[0].send(msg);
            }
        }

        function onDoorRightClick(f, d) {
            const el = document.getElementById(`d-${f}-${d}`);
            if (el.classList.contains('state-error')) {
                el.classList.remove('state-error');
                updateDoorUI(f, d);
            } else {
                el.classList.remove('state-pass');
                el.classList.add('state-error');
            }
        }

        function updateDoorUI(f, d) {
            const el = document.getElementById(`d-${f}-${d}`);
            if (mapData[f][d] === 1) {
                el.classList.add('state-pass');
                el.classList.remove('state-error');
            } else {
                el.classList.remove('state-pass');
            }
        }

        function resetAll() {
            if (!confirm("確定要重設所有標記嗎？")) return;
            clearLocal();
            const msg = { type: 'RESET' };
            if (isHost) broadcast(msg);
            else if (guestConns.length > 0 && guestConns[0].open) {
                guestConns[0].send(msg);
            }
        }

        function clearLocal() {
            for(let f=0; f<10; f++) for(let d=0; d<4; d++) {
                mapData[f][d] = 0;
                const el = document.getElementById(`d-${f}-${d}`);
                el.classList.remove('state-pass', 'state-error');
            }
        }

        // === 啟動程序 ===
        renderGrid();
        const initialHash = window.location.hash.substring(1);
        if (initialHash) {
            els.joinInput.value = initialHash;
            log("偵測到 URL 帶有預設房號，請點擊『加入房間』發起連線。", "warn");
        }
    </script>
</body>

</html>
